name: the_spot_campus_student
description: The Spot Campus - Student Mobile App with AI-powered exam proctoring
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  camera: ^0.11.0
  google_fonts: ^6.1.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  socket_io_client: ^2.0.3+1
  google_mlkit_face_detection: ^0.13.2
  razorpay_flutter: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
